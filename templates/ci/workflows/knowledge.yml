# Knowledge Repo Pipeline
# Template for knowledge/RAG repos (e.g., config exports, wiki articles).
# Triggered on push to main. Validates export format, triggers reindexing.
#
# Copy to: .gitea/workflows/knowledge.yml in your knowledge repo
# Customize: validation rules, reindex endpoint
name: Knowledge Publish

on:
  push:
    branches: [main]

env:
  CI_SCRIPTS_REF: v0.1.0

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout ci-scripts
        uses: actions/checkout@v4
        with:
          repository: ExampleOrg/ci-scripts
          ref: ${{ env.CI_SCRIPTS_REF }}
          path: ci-scripts

      # Validate that markdown/json/yaml files are well-formed
      - name: Validate export format
        run: |
          ERRORS=0
          # Check markdown files exist and are non-empty
          for f in $(find . -name "*.md" -not -path "./ci-scripts/*" -not -path "./.git/*"); do
            if [ ! -s "$f" ]; then
              echo "WARNING: Empty file: $f"
            fi
          done
          # Check JSON files are valid
          for f in $(find . -name "*.json" -not -path "./ci-scripts/*" -not -path "./.git/*"); do
            if ! python -m json.tool "$f" > /dev/null 2>&1 && ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "ERROR: Invalid JSON: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "Validation failed with $ERRORS errors"
            exit 1
          fi
          echo "Validation passed"

  trigger-reindex:
    name: Trigger Reindex
    needs: validate
    runs-on: ubuntu-latest
    steps:
      # --- Customize: trigger your RAG indexing pipeline ---
      # Example: POST to search service reindex endpoint
      # - name: Trigger reindex
      #   run: |
      #     curl -sf --max-time 30 \
      #       -X POST \
      #       -H "Authorization: Bearer ${{ secrets.SEARCH_API_KEY }}" \
      #       "https://search.example.com/api/reindex?source=${{ github.repository }}"

      - name: Trigger reindex (placeholder)
        run: echo "Add reindex trigger here (e.g., POST to search service API)"
