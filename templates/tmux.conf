# tmux config for agent-team / cmux split-pane work.
# Accordion: double-LEFT-click a teammate to spotlight it; RIGHT-click to reset;
# drag dividers to resize. Font zoom is a Windows Terminal feature: Ctrl+- / Ctrl+= / Ctrl+0
# (works through tmux; avoid Ctrl+Scroll when mouse mode is on -- tmux eats the wheel).

# Mouse: wheel-scroll panes, click to select, drag borders to resize
set -g mouse on

# Label each pane border with its index + title (Claude sets teammate names as titles)
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title}#{?pane_active, [active],} "

# Bigger scrollback so a teammate's full run is readable
set -g history-limit 50000

# Accordion (mouse), two buttons, no toggle state:
#   double-LEFT-click a teammate -> spotlight it (others shrink to min height)
#   double-LEFT-click another     -> spotlight jumps straight to it
#   RIGHT-click anywhere          -> back to the equal/default layout
set -g main-pane-width 50%        # preserves main's left width when the column equalizes
bind -n DoubleClick1Pane select-pane \; resize-pane -y 90%
# right-click = reset to equal (replaces tmux's context menu; paste stays on Ctrl+Shift+V)
unbind -n MouseDown3Pane
bind   -n MouseDown3Pane select-layout main-vertical

# Ctrl-b =  -> same reset from the keyboard (handy after Claude re-tiles on join/idle/leave)
bind = select-layout main-vertical
